<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Sarabun', sans-serif; padding: 20px; background: #f8f9fa; color: #202124; }
  h3 { font-size: 16px; color: #1a73e8; margin-bottom: 16px; }
  .note { font-size: 12px; color: #80868b; background: #e8f0fe; padding: 8px 12px; border-radius: 6px; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 4px; color: #3c4043; }
  input[type="number"] {
    width: 100%; padding: 8px 12px; border: 1.5px solid #dadce0;
    border-radius: 8px; font-size: 14px; outline: none;
    font-family: 'Sarabun', sans-serif;
  }
  input:focus { border-color: #1a73e8; }
  .btn-row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 20px; }
  button { padding: 9px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: 'Sarabun', sans-serif; }
  .btn-save   { background: #1a73e8; color: white; }
  .btn-cancel { background: #e8eaed; color: #333; }
  .msg { font-size: 13px; margin-top: 10px; padding: 8px 12px; border-radius: 6px; display: none; }
  .msg.show { display: block; background: #e6f4ea; color: #137333; }
</style>
</head>
<body>
<h3>⚙️ ตั้งค่าสิทธิ์วันลาประจำปี</h3>
<div class="note">💡 ค่านี้จะถูกบันทึกลงในแถว 2 ของชีต "data" และใช้คำนวณวันลาคงเหลือ</div>

<div class="form-group">
  <label>🤒 ลาป่วย (วัน/ปี)</label>
  <input type="number" id="sick" min="0" step="0.5" placeholder="30">
</div>
<div class="form-group">
  <label>💼 ลากิจจ่าย (วัน/ปี)</label>
  <input type="number" id="paid" min="0" step="0.5" placeholder="6">
</div>
<div class="form-group">
  <label>📋 ลากิจหัก (วัน/ปี) — ใส่ 999 ถ้าไม่จำกัด</label>
  <input type="number" id="unpaid" min="0" step="0.5" placeholder="999">
</div>
<div class="form-group">
  <label>🏖️ ลาพักร้อน (วัน/ปี)</label>
  <input type="number" id="vacation" min="0" step="0.5" placeholder="6">
</div>

<div class="btn-row">
  <button class="btn-cancel" onclick="google.script.host.close()">ยกเลิก</button>
  <button class="btn-save" onclick="save()">💾 บันทึก</button>
</div>
<div class="msg" id="msg"></div>

<script>
  google.script.run.withSuccessHandler(q => {
    document.getElementById('sick').value    = q.sick;
    document.getElementById('paid').value    = q.paidLeave;
    document.getElementById('unpaid').value  = q.unpaidLeave;
    document.getElementById('vacation').value = q.vacation;
  }).getQuota();

  function save() {
    google.script.run
      .withSuccessHandler(msg => {
        const el = document.getElementById('msg');
        el.textContent = msg;
        el.className = 'msg show';
        setTimeout(() => google.script.host.close(), 1500);
      })
      .withFailureHandler(err => {
        const el = document.getElementById('msg');
        el.textContent = '❌ ' + err.message;
        el.style.background = '#fce8e6';
        el.style.color = '#c5221f';
        el.className = 'msg show';
      })
      .saveQuota({
        sick:        Number(document.getElementById('sick').value),
        paidLeave:   Number(document.getElementById('paid').value),
        unpaidLeave: Number(document.getElementById('unpaid').value),
        vacation:    Number(document.getElementById('vacation').value),
      });
  }
</script>
</body>
</html>
